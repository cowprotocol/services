[package]
name = "shared"
version = "0.1.0"
authors = ["Gnosis Developers <developers@gnosis.io>", "Cow Protocol Developers <dev@cow.fi>"]
edition = "2024"
license = "MIT OR Apache-2.0"

[lib]
doctest = false

[dependencies]
account-balances = { workspace = true }
alloy = { workspace = true, features = ["provider-trace-api", "rand", "signer-local", "sol-types"] }
anyhow = { workspace = true }
app-data = { workspace = true }
arc-swap = { workspace = true }
async-trait = { workspace = true }
bad-tokens = { workspace = true }
balance-overrides = { workspace = true }
bigdecimal = { workspace = true }
bytes-hex = { workspace = true }
cached = { workspace = true }
chain = { workspace = true }
chrono = { workspace = true, features = ["clock"] }
clap = { workspace = true }
const-hex = { workspace = true }
contracts = { workspace = true }
dashmap = { workspace = true }
database = { workspace = true }
derive_more = { workspace = true }
ethrpc = { workspace = true }
futures = { workspace = true }
gas-price-estimation = { workspace = true }
hex-literal = { workspace = true }
humantime = { workspace = true }
indexmap = { workspace = true }
itertools = { workspace = true }
liquidity-sources = { workspace = true }
mockall = { workspace = true, optional = true }
model = { workspace = true }
moka = { workspace = true, features = ["sync"] }
num = { workspace = true }
number = { workspace = true }
observe = { workspace = true }
order-validation = { workspace = true }
price-estimation = { workspace = true }
prometheus = { workspace = true }
prometheus-metric-storage = { workspace = true }
rand = { workspace = true }
rate-limit = { workspace = true }
request-sharing = { workspace = true }
reqwest = { workspace = true, features = ["cookies", "gzip", "json", "query"] }
rust_decimal = { workspace = true, features = ["maths"] }
serde = { workspace = true }
serde_json = { workspace = true }
serde_with = { workspace = true }
signature-validator = { workspace = true }
strum = { workspace = true }
thiserror = { workspace = true }
token-info = { workspace = true }
tokio = { workspace = true, features = ["macros", "signal", "time"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt", "time"] }
url = { workspace = true }

[dev-dependencies]
account-balances = { workspace = true, features = ["test-util"] }
signature-validator = { workspace = true, features = ["test-util"] }
alloy = { workspace = true, features = ["rand"] }
app-data = { workspace = true, features = ["test_helpers"] }
async-stream = { workspace = true }
ethrpc = { workspace = true, features = ["test-util"] }
maplit = { workspace = true }
mockall = { workspace = true }
price-estimation = { workspace = true, features = ["test-util"] }
regex = { workspace = true }
testlib = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }
toml = { workspace = true }

[features]
test-util = ["dep:mockall"]

[lints]
workspace = true
