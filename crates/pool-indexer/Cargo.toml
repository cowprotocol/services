[package]
name = "pool-indexer"
version = "0.1.0"
authors = ["Cow Protocol Developers <dev@cow.fi>"]
edition = "2024"
license = "GPL-3.0-or-later"

[lib]
doctest = false
name = "pool_indexer"
path = "src/lib.rs"

[[bin]]
name = "pool-indexer"
path = "src/main.rs"

[dependencies]
alloy = { workspace = true, features = ["providers", "rpc-types", "sol-types"] }
alloy-primitives = { workspace = true, features = ["std"] }
anyhow = { workspace = true }
axum = { workspace = true }
bigdecimal = { workspace = true }
clap = { workspace = true }
contracts = { workspace = true }
ethrpc = { workspace = true }
futures = { workspace = true }
mimalloc = { workspace = true, optional = true }
num = { workspace = true }
number = { workspace = true }
observe = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true }
tikv-jemallocator = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
toml = { workspace = true }
tower-http = { workspace = true, features = ["trace"] }
tracing = { workspace = true }
url = { workspace = true }

[features]
mimalloc-allocator = ["dep:mimalloc"]
tokio-console = ["observe/tokio-console"]

[lints]
workspace = true
