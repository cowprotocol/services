[package]
name = "solana-indexer"
version = "0.1.0"
authors = ["Cow Protocol Developers <dev@cow.fi>"]
edition = "2024"
license = "GPL-3.0-or-later"
description = "Solana settlement indexer for CoW Protocol"
repository = "https://github.com/cowprotocol/services"

[lib]
name = "solana_indexer"
path = "src/lib.rs"

[[bin]]
name = "solana-indexer"
path = "src/main.rs"

[dependencies]
async-trait = { workspace = true }
bytes = { workspace = true }
derive_more = { workspace = true }
futures = { workspace = true }
settlement-interface = {
  package = "settlement-interface",
  git = "https://github.com/cowprotocol/solana-programs",
  branch = "make-parsing-generic-on-accounts"
}
solana-client = { workspace = true }
solana-sdk = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync"] }
tracing = { workspace = true }
yellowstone-grpc-client = { workspace = true }
yellowstone-grpc-proto = { workspace = true }

[lints]
workspace = true
