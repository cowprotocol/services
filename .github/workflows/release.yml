name: Weekly Release

on:
  workflow_dispatch:
  schedule:
    # At 00:00 on Monday
    - cron: "0 0 * * 1"

jobs:
  bump-version-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags
          # Requires "Read and Write access to code" permission
          token: ${{ secrets.RELEASE_ACTION_ACCESS_TOKEN }}

      - name: Fetch latest release version tag
        id: fetch_tag
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/cowprotocol/services/releases/latest | jq -r '.tag_name')
          if ! [[ "$LATEST_VERSION" =~ ^v[0-9]+\.[0-9]+\..* ]]; then
            echo "Invalid tag format, cannot bump version of: $LATEST_VERSION"
            exit 1
          fi
          echo "latest=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Check for changes since last tag
        run: |
          git diff --quiet $LATEST..HEAD || echo "CHANGES_DETECTED=true" >> $GITHUB_ENV
        env:
          LATEST: ${{ steps.fetch_tag.outputs.latest }}

      - name: No changes detected
        if: env.CHANGES_DETECTED != 'true'
        run: echo "No commits since previous release. Skipping release."

      - name: Create Tag
        id: tag_version
        if: env.CHANGES_DETECTED == 'true'
        run: |
          MAJOR=$(echo $LATEST | cut -d. -f1)
          MINOR=$(echo $LATEST | cut -d. -f2)
          NEW_MINOR=$((MINOR+1))
          NEW_TAG="${MAJOR}.${NEW_MINOR}.0"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          git tag $NEW_TAG
          git push origin --tags
        env:
          LATEST: ${{ steps.fetch_tag.outputs.latest }}

      - name: "Create release"
        if: env.CHANGES_DETECTED == 'true'
        uses: "actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3" # v9.0.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            try {
              const response = await github.rest.repos.createRelease({
                draft: false,
                generate_release_notes: true,
                name: `Weekly Release ${process.env.TAG}`,
                owner: context.repo.owner,
                prerelease: false,
                repo: context.repo.repo,
                tag_name: process.env.TAG,
              });

              core.exportVariable('RELEASE_ID', response.data.id);
              core.exportVariable('RELEASE_UPLOAD_URL', response.data.upload_url);
            } catch (error) {
              core.setFailed(error.message);
            }
        env:
          TAG: ${{ steps.tag_version.outputs.tag }}

  notify-failure:
    needs: [bump-version-and-release]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify weekly release failure
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets.ALERTS_PROD_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "❌ *Weekly release creation failed!* (cowprotocol/services)\nThe release tag / GitHub release was not created — investigate before the next prod deploy.\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
