name: deploy
on:
  push:
    branches: [main]
    tags: [v*]
  workflow_dispatch:
    inputs:
      predefined_feature:
        description: 'Select a predefined feature'
        type: choice
        options:
          - 'None'
          - 'mimalloc-allocator'
          - 'tokio-console'
        default: 'None'
        required: false
      custom_features:
        description: 'Additional custom features (space-separated, e.g., "feature1 feature2")'
        type: string
        required: false
        default: ''

jobs:
  deploy:
    # the build runner must have a glibc version <= the docker base image we copy the build
    # artifacts onto to be compatible
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Without this the fetch depth defaults to 1, which only includes the most recent commit. We want to know the full history so that `git describe` can give more information when it is invoked in the orderbook's crate build script.
          fetch-depth: '0'
          persist-credentials: false

      # the checkout action sets the "modified" time of every file to the current time which
      # makes `cargo` think something changed about the file. To help it detect what actually
      # changed compared to the cached build artifacts we set the "modified" time of every
      # file to the timestamp of the commit that last changed it.
      - uses: chetan/git-restore-mtime-action@d186aca54f8760da4dec55313195e51ed3ebb0b3 # v2.3

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal && rustup default stable

      - name: Prepare build features
        id: features
        run: |
          FEATURES=""

          if [ "${{ github.event.inputs.predefined_feature }}" != "None" ]; then
            FEATURES="${{ github.event.inputs.predefined_feature }}"
          fi

          if [ -n "${{ github.event.inputs.custom_features }}" ]; then
            FEATURES="${FEATURES:+$FEATURES }${{ github.event.inputs.custom_features }}"
          fi

          if [ -n "$FEATURES" ]; then
            CARGO_FEATURES="--features $FEATURES"
          fi

          if echo "$FEATURES" | grep -q "tokio-console"; then
            # Export to GITHUB_ENV so rust-cache picks it up in its cache-key hash
            # (it hashes all RUST* env vars). Without this, tokio-console and normal
            # builds share the same cache bucket despite having incompatible artifacts.
            echo "RUSTFLAGS=--cfg tokio_unstable" >> $GITHUB_ENV
          fi

          echo "cargo_features=$CARGO_FEATURES" >> $GITHUB_OUTPUT

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-all-crates: true
          cache-workspace-crates: true
          # shared-key is included in restore-key prefix matching, so it produces a
          # branch-scoped fallback before falling back to any-branch caches.
          # key (run_id) makes the primary key unique so each run saves a fresh cache.
          # Restore order: same branch (most recent) → any branch (same Cargo.lock) → any branch.
          shared-key: ${{ github.ref_name }}
          key: ${{ github.run_id }}

      - name: Build release binaries
        run: |
          cargo build --release \
            -p autopilot -p driver -p orderbook -p refunder -p solvers -p pool-indexer \
            ${{ steps.features.outputs.cargo_features }}

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Services image metadata
        id: meta_services
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
          labels: |
            org.opencontainers.image.licenses=GPL-3.0-or-later

      - name: Services image build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.deploy-ci
          push: true
          tags: ${{ steps.meta_services.outputs.tags }}
          labels: ${{ steps.meta_services.outputs.labels }}
          build-contexts: binaries=target/release
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}

      - name: Migration image metadata
        id: meta_migration
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}-migration
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
          labels: |
            org.opencontainers.image.licenses=GPL-3.0-or-later

      - name: Migration image build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.deploy-ci
          target: migrations
          push: true
          tags: ${{ steps.meta_migration.outputs.tags }}
          labels: ${{ steps.meta_migration.outputs.labels }}

      - uses: cowprotocol/autodeploy-action@73f1163f19a584cdc34e29aa84d630d7e6a45432 # v3
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          images: ghcr.io/cowprotocol/services:main
          strategy: restart # Recreates the deployment
          tag: ${{ secrets.AUTODEPLOY_TAG }}
          url: ${{ secrets.AUTODEPLOY_URL }}
          token: ${{ secrets.AUTODEPLOY_TOKEN }}
          timeout: 600000 # 10 minutes

      # Temporarily disabled while the automated-trades deploy setup is reworked
      # (cowprotocol/automated-trade#36). Re-enable once the new job is in place.
      # After the new version is rolled out to the k8s cluster, ask the
      # infrastructure repo to run an automated test trade on every network
      # to verify the deployment end-to-end.
      # - name: "📣 Dispatch automated trades to infrastructure repo"
      #   if: ${{ github.ref == 'refs/heads/main' }}
      #   uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
      #   with:
      #     token: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
      #     repository: cowprotocol/infrastructure
      #     event-type: run-automated-trades
      #     client-payload: |-
      #       {"ref":"${{ github.ref }}","sha":"${{ github.sha }}","source":"services-deploy"}
